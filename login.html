<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA — Masuk</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0f172a;--bg-mid:#1e3a5f;--bg-card:rgba(30,58,95,.35);
  --teal:#0d9488;--teal-light:#2dd4bf;--lavender:#a5b4fc;--lavender-light:#c7d2fe;
  --text:#e2e8f0;--text-muted:#94a3b8;--white:#f8fafc;
  --glow-teal:0 0 20px rgba(13,148,136,.4);
}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:radial-gradient(ellipse at top,#1e3a5f 0%,#0f172a 60%);
  color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;
}
#neural-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.5}
.main-wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

/* NAVBAR */
nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:1.2rem 3rem;backdrop-filter:blur(10px);
  background:rgba(15,23,42,.6);border-bottom:1px solid rgba(165,180,252,.1);
}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:3px;color:var(--lavender);text-decoration:none;text-shadow:0 0 20px rgba(165,180,252,.3)}
.logo:hover{color:var(--lavender-light)}

/* LOGIN CARD */
.login-container{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.login-card{
  width:100%;max-width:420px;background:var(--bg-card);
  border:1px solid rgba(165,180,252,.25);border-radius:20px;padding:3rem 2.5rem;
  backdrop-filter:blur(20px);position:relative;
  box-shadow:0 0 40px rgba(13,148,136,.15),0 0 60px rgba(165,180,252,.1);
}
.login-card::before{
  content:'';position:absolute;inset:-1px;border-radius:20px;padding:1px;
  background:linear-gradient(135deg,var(--teal),var(--lavender),var(--teal));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.5;pointer-events:none;
}
.login-header{text-align:center;margin-bottom:2.5rem}
.login-header .icon{font-size:2.5rem;margin-bottom:.5rem}
.login-header h2{font-size:1.8rem;color:var(--lavender);font-weight:700}
.login-header p{font-size:.9rem;color:var(--text-muted);margin-top:.5rem}

/* FORM */
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;font-size:.85rem;color:var(--lavender-light);margin-bottom:.5rem;font-weight:500}
.input-wrap{position:relative}
.input-wrap input{
  width:100%;padding:.9rem 1rem .9rem 2.8rem;
  background:rgba(15,23,42,.6);border:1px solid rgba(165,180,252,.2);
  border-radius:10px;color:var(--text);font-size:.95rem;transition:.3s;
}
.input-wrap input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 15px rgba(13,148,136,.2)}
.input-wrap input::placeholder{color:#64748b}
.input-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:1.1rem;opacity:.7}
.toggle-pwd{
  position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:1.1rem;opacity:.6;transition:.3s;
}
.toggle-pwd:hover{opacity:1}

/* BUTTON */
.btn-login{
  width:100%;padding:1rem;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--teal),var(--lavender));
  color:var(--white);font-size:1rem;font-weight:600;cursor:pointer;transition:.3s;
  box-shadow:var(--glow-teal);
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(45,212,191,.4)}
.btn-login:active{transform:translateY(0)}

/* DEMO INFO */
.demo-info{
  margin-top:2rem;padding:1.2rem;border:1px solid rgba(45,212,191,.2);border-radius:12px;
  background:rgba(13,148,136,.08);text-align:center;
}
.demo-info p{font-size:.8rem;color:var(--teal-light);margin-bottom:.8rem}
.demo-info code{color:var(--lavender-light);font-size:.85rem}
.btn-autofill{
  width:100%;padding:.7rem;margin-top:.8rem;
  background:transparent;border:1px solid var(--teal);border-radius:8px;
  color:var(--teal-light);font-size:.85rem;cursor:pointer;transition:.3s;
}
.btn-autofill:hover{background:rgba(13,148,136,.15)}

/* ERROR MSG */
.error-msg{
  display:none;padding:.8rem 1rem;margin-bottom:1.5rem;border-radius:8px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;font-size:.85rem;text-align:center;
}
.error-msg.show{display:block}

/* FOOTER */
footer{
  text-align:center;padding:2rem;background:rgba(15,23,42,.8);
  border-top:1px solid rgba(165,180,252,.1);color:var(--text-muted);font-size:.9rem;
}

@media(max-width:480px){
  nav{padding:1rem 1.5rem}
  .login-card{padding:2rem 1.5rem}
}
</style>
</head>
<body>
<canvas id="neural-canvas"></canvas>
<div class="main-wrap">

<nav>
  <a href="index.html" class="logo">SOMA</a>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="icon">🧠</div>
      <h2>Masuk ke SOMA</h2>
      <p>Bangunkan kekuatan otak yang tidur</p>
    </div>

    <div class="error-msg" id="errorMsg">Email atau password salah</div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="nama@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="toggle-pwd" id="togglePwd" onclick="togglePassword()">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-login">Masuk →</button>
    </form>

    <div class="demo-info">
      <p>Demo Account tersedia:</p>
      <code>demo@soma.app</code> &nbsp;/&nbsp; <code>soma123</code>
      <br>
      <button class="btn-autofill" onclick="autofill()">Isi Otomatis</button>
    </div>
  </div>
</div>

<footer>
  Soma — Bangunkan kekuatan otak yang tidur • Dibuat dengan ❤️ untuk Pak Husni
</footer>

</div>

<script>
/* ===== NEURAL ANIMATION ===== */
(function(){
  var canvas=document.getElementById('neural-canvas');
  var ctx=canvas.getContext('2d');
  var W,H,particles;
  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    initParticles();
  }
  function initParticles(){
    var count=Math.min(60,Math.floor(W*H/20000));
    particles=[];
    for(var i=0;i<count;i++){
      particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*2+1});
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(165,180,252,0.5)';
      ctx.fill();
      for(var j=i+1;j<particles.length;j++){
        var q=particles[j];
        var dx=p.x-q.x,dy=p.y-q.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<130){
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);
          ctx.lineTo(q.x,q.y);
          ctx.strokeStyle='rgba(45,212,191,'+(1-dist/130)*0.15+')';
          ctx.lineWidth=0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();
  draw();
})();

/* ===== SEED DEMO USER ===== */
function seedDemoUser(){
  var users=JSON.parse(localStorage.getItem('soma_users')||'[]');
  var exists=users.find(function(u){return u.email==='demo@soma.app'});
  if(!exists){
    users.push({id:'u1',nama:'Pak Husni',email:'demo@soma.app',password:'soma123',createdAt:new Date().toISOString()});
    localStorage.setItem('soma_users',JSON.stringify(users));
  }
}

/* ===== AUTO REDIRECT IF LOGGED IN ===== */
function checkSession(){
  var session=JSON.parse(localStorage.getItem('soma_session')||'null');
  if(session && session.userId){
    window.location.href='dashboard.html';
  }
}

/* ===== TOGGLE PASSWORD ===== */
function togglePassword(){
  var pwd=document.getElementById('password');
  var btn=document.getElementById('togglePwd');
  if(pwd.type==='password'){
    pwd.type='text';
    btn.textContent='🙈';
  } else {
    pwd.type='password';
    btn.textContent='👁️';
  }
}

/* ===== AUTOFILL DEMO ===== */
function autofill(){
  document.getElementById('email').value='demo@soma.app';
  document.getElementById('password').value='soma123';
}

/* ===== HANDLE LOGIN ===== */
function handleLogin(e){
  e.preventDefault();
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var errorEl=document.getElementById('errorMsg');

  var users=JSON.parse(localStorage.getItem('soma_users')||'[]');
  var user=users.find(function(u){return u.email===email && u.password===password});

  if(user){
    localStorage.setItem('soma_session',JSON.stringify({
      userId:user.id,nama:user.nama,loginAt:new Date().toISOString()
    }));
    window.location.href='dashboard.html';
  } else {
    errorEl.classList.add('show');
    setTimeout(function(){errorEl.classList.remove('show')},3000);
  }
  return false;
}

/* ===== INIT ===== */
seedDemoUser();
checkSession();
</script>
</body>
</html>
