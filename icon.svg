<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  <!-- Brain neural network -->
  <g stroke="#0d9488" stroke-width="3" fill="none" opacity="0.8">
    <line x1="180" y1="160" x2="256" y2="120"/>
    <line x1="256" y1="120" x2="332" y2="160"/>
    <line x1="180" y1="160" x2="160" y2="256"/>
    <line x1="332" y1="160" x2="352" y2="256"/>
    <line x1="160" y1="256" x2="200" y2="352"/>
    <line x1="352" y1="256" x2="312" y2="352"/>
    <line x1="200" y1="352" x2="256" y2="392"/>
    <line x1="312" y1="352" x2="256" y2="392"/>
    <line x1="256" y1="120" x2="256" y2="200"/>
    <line x1="256" y1="200" x2="200" y2="256"/>
    <line x1="256" y1="200" x2="312" y2="256"/>
    <line x1="200" y1="256" x2="312" y2="256"/>
    <line x1="256" y1="200" x2="256" y2="300"/>
    <line x1="256" y1="300" x2="200" y2="352"/>
    <line x1="256" y1="300" x2="312" y2="352"/>
    <line x1="180" y1="160" x2="256" y2="200"/>
    <line x1="332" y1="160" x2="256" y2="200"/>
  </g>
  <!-- Glowing nodes -->
  <g fill="#0d9488">
    <circle cx="180" cy="160" r="8"/>
    <circle cx="256" cy="120" r="10"/>
    <circle cx="332" cy="160" r="8"/>
    <circle cx="160" cy="256" r="8"/>
    <circle cx="256" cy="200" r="12"/>
    <circle cx="352" cy="256" r="8"/>
    <circle cx="200" cy="256" r="7"/>
    <circle cx="312" cy="256" r="7"/>
    <circle cx="256" cy="300" r="10"/>
    <circle cx="200" cy="352" r="8"/>
    <circle cx="312" cy="352" r="8"/>
    <circle cx="256" cy="392" r="10"/>
  </g>
  <!-- Glow effect on center -->
  <circle cx="256" cy="200" r="20" fill="#0d9488" opacity="0.2"/>
  <circle cx="256" cy="300" r="18" fill="#a5b4fc" opacity="0.2"/>
  <circle cx="256" cy="300" r="8" fill="#a5b4fc"/>
